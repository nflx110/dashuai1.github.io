<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能数据解析工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4cc9f0;
            --success-color: #4ade80;
            --warning-color: #facc15;
            --danger-color: #f87171;
            --background-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .theme-selector select {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            backdrop-filter: blur(10px);
        }

        .theme-selector select option {
            background-color: var(--surface-color);
            color: var(--text-primary);
        }

        .tabs {
            display: flex;
            background-color: var(--surface-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin: 1.5rem 0;
            box-shadow: var(--shadow-md);
        }

        .tab-button {
            flex: 1;
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .tab-button i {
            font-size: 1.1rem;
        }

        .tab-button:hover:not(.active) {
            background-color: #f1f5f9;
            color: var(--text-primary);
        }

        .tab-button.active {
            background-color: var(--primary-color);
            color: white;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(500px, 100%), 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .card {
            background-color: var(--surface-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: #f9fafb;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.2);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--secondary-color);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: #f1f5f9;
            color: var(--text-primary);
        }

        button.secondary:hover {
            background-color: #e2e8f0;
        }

        .result-container {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f8fafc;
            border-radius: var(--radius-md);
            border: 1px dashed var(--border-color);
            min-height: 100px;
        }

        .result-item {
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
            font-family: monospace;
            word-break: break-all;
            background-color: white;
            border-left: 3px solid var(--primary-color);
        }

        .result-item.match {
            border-left-color: var(--success-color);
            background-color: #f0fdf4;
        }

        .result-item.mismatch {
            border-left-color: var(--warning-color);
            background-color: #fefce8;
        }

        .result-item.error {
            border-left-color: var(--danger-color);
            background-color: #fef2f2;
        }

        .verification-input {
            margin-top: 0.5rem;
            width: calc(100% - 2rem);
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .card-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1><i class="fas fa-wrench"></i> 智能数据解析工具</h1>
            <div class="theme-selector">
                <select id="theme-select">
                    <option value="light">默认主题</option>
                    <option value="dark">深色模式</option>
                </select>
            </div>
        </div>
    </header>

    <div class="app-container">
        <nav class="tabs">
            <button class="tab-button active" data-tab="url-tab">
                <i class="fas fa-link"></i> URL 解析
            </button>
            <button class="tab-button" data-tab="json-tab">
                <i class="fas fa-file-code"></i> JSON 解析
            </button>
            <button class="tab-button" data-tab="time-tab">
                <i class="fas fa-clock"></i> 时间转换
            </button>
        </nav>

        <main>
            <!-- URL Tab -->
            <section id="url-tab" class="tab-content active">
                <div class="card-grid">
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-cogs"></i> 解析与提取</h3>
                        <div class="form-group">
                            <label for="url-input"><i class="fas fa-globe-asia"></i> 输入URL</label>
                            <textarea id="url-input" placeholder="https://example.com/path?param1=value1&param2=value2"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="param-select"><i class="fas fa-list"></i> 选择参数</label>
                            <select id="param-select">
                                <option value="">全部参数</option>
                                <option value="utm_source">utm_source</option>
                                <option value="utm_medium">utm_medium</option>
                                <option value="utm_campaign">utm_campaign</option>
                                <option value="id">id</option>
                                <option value="ref">ref</option>
                            </select>
                        </div>
                        <div class="button-group">
                            <button onclick="parseUrl()"><i class="fas fa-play"></i> 解析</button>
                            <button class="secondary" onclick="clearResults()"><i class="fas fa-broom"></i> 清空</button>
                        </div>
                        <div id="parsed-results" class="result-container"></div>
                    </div>
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-exchange-alt"></i> 对比验证</h3>
                        <div class="form-group">
                            <label for="correct-url-input"><i class="fas fa-check-circle"></i> 参考URL</label>
                            <textarea id="correct-url-input" placeholder="粘贴正确的URL进行比对..."></textarea>
                        </div>
                        <button onclick="compareUrls()"><i class="fas fa-search"></i> 开始比对</button>
                        <div id="comparison-results" class="result-container"></div>
                    </div>
                </div>
            </section>

            <!-- JSON Tab -->
            <section id="json-tab" class="tab-content">
                <div class="card-grid">
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-cogs"></i> 解析与提取</h3>
                        <div class="form-group">
                            <label for="json-input"><i class="fas fa-code"></i> 输入JSON</label>
                            <textarea id="json-input" placeholder='{ "user": { "name": "张三" } }'></textarea>
                        </div>
                        <div class="form-group">
                            <label for="field-paths"><i class="fas fa-key"></i> 字段路径 (每行一个)</label>
                            <textarea id="field-paths" placeholder="user.name&#10;user.id">user.name
user.id
settings.theme</textarea>
                        </div>
                        <div class="button-group">
                            <button onclick="extractJsonFields()"><i class="fas fa-play"></i> 提取</button>
                            <button class="secondary" onclick="clearJsonResults()"><i class="fas fa-broom"></i> 清空</button>
                        </div>
                        <div id="json-results" class="result-container"></div>
                    </div>
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-tasks"></i> 验证中心</h3>
                        <p>在上方提取结果中，每个字段旁会出现输入框，输入期望值即可实时比对。</p>
                        <div id="verification-results" class="result-container">
                            <p>请先在左侧执行“提取”操作。</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Time Tab -->
            <section id="time-tab" class="tab-content">
                <div class="card-grid">
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-calendar-day"></i> 时间戳转换</h3>
                        <div class="form-group">
                            <label for="timestamp-input"><i class="fas fa-hourglass-half"></i> 输入时间戳 (秒或毫秒)</label>
                            <input type="number" id="timestamp-input" placeholder="例如: 1700000000 或 1700000000000">
                        </div>
                        <button onclick="convertTimestamp()"><i class="fas fa-sync-alt"></i> 转换</button>
                        <div id="timestamp-result" class="result-container"></div>
                    </div>
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-hourglass-end"></i> 分钟转时分秒</h3>
                        <div class="form-group">
                            <label for="minutes-input"><i class="fas fa-stopwatch"></i> 输入分钟数</label>
                            <input type="number" id="minutes-input" placeholder="例如: 125">
                        </div>
                        <button onclick="convertMinutes()"><i class="fas fa-sync-alt"></i> 转换</button>
                        <div id="time-format-result" class="result-container"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer>
        <p>智能数据解析工具 &copy; 2026</p>
    </footer>

    <script>
        // Tab Switching
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', () => {
                const targetTab = button.getAttribute('data-tab');

                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.querySelectorAll('.tab-button').forEach(btn => {
                    btn.classList.remove('active');
                });

                document.getElementById(targetTab).classList.add('active');
                button.classList.add('active');
            });
        });

        // Theme Switching
        const themeSelect = document.getElementById('theme-select');
        const root = document.documentElement;

        const themes = {
            light: {
                '--primary-color': '#4361ee',
                '--secondary-color': '#3f37c9',
                '--background-color': '#f8fafc',
                '--surface-color': '#ffffff',
                '--text-primary': '#1e293b',
                '--text-secondary': '#64748b',
                '--border-color': '#e2e8f0',
            },
            dark: {
                '--primary-color': '#809fff',
                '--secondary-color': '#6d61d6',
                '--background-color': '#0f172a',
                '--surface-color': '#1e293b',
                '--text-primary': '#f1f5f9',
                '--text-secondary': '#94a3b8',
                '--border-color': '#334155',
            }
        };

        function applyTheme(themeName) {
            const themeVars = themes[themeName] || themes.light;
            Object.entries(themeVars).forEach(([prop, val]) => {
                root.style.setProperty(prop, val);
            });
            localStorage.setItem('selectedTheme', themeName);
        }

        themeSelect.addEventListener('change', (e) => {
            applyTheme(e.target.value);
        });

        window.onload = function() {
            const savedTheme = localStorage.getItem('selectedTheme') || 'light';
            applyTheme(savedTheme);
            themeSelect.value = savedTheme;
        };

        // URL Functions
        function parseUrl() {
            const urlStr = document.getElementById('url-input').value;
            if (!urlStr) return;
            try {
                const url = new URL(urlStr);
                const searchParams = new URLSearchParams(url.search);
                const resultsDiv = document.getElementById('parsed-results');
                const selectedParam = document.getElementById('param-select').value;
                
                let html = '<h4>解析结果:</h4>';
                if (selectedParam) {
                    const value = searchParams.get(selectedParam);
                    html += `<div class="result-item"><strong>${selectedParam}:</strong> ${value || 'N/A'}</div>`;
                } else {
                    for (const [key, value] of searchParams) {
                        html += `<div class="result-item"><strong>${key}:</strong> ${value}</div>`;
                    }
                }
                resultsDiv.innerHTML = html;
            } catch (e) {
                alert('URL格式错误: ' + e.message);
            }
        }

        function compareUrls() {
            const userUrlStr = document.getElementById('url-input').value;
            const correctUrlStr = document.getElementById('correct-url-input').value;
            if (!userUrlStr || !correctUrlStr) {
                alert('请输入待比较和参考的URL！');
                return;
            }
            try {
                const userUrl = new URL(userUrlStr);
                const correctUrl = new URL(correctUrlStr);
                const userParams = new Map(new URLSearchParams(userUrl.search));
                const correctParams = new Map(new URLSearchParams(correctUrl.search));
                const allKeys = new Set([...userParams.keys(), ...correctParams.keys()]);
                const resultsDiv = document.getElementById('comparison-results');

                let html = '<h4>比对结果:</h4>';
                for (const key of allKeys) {
                    const userVal = userParams.get(key);
                    const correctVal = correctParams.get(key);
                    let cls = 'result-item';
                    let status = '';
                    if (userVal === undefined) {
                        cls += ' error'; status = ' (缺失)';
                    } else if (correctVal === undefined) {
                        cls += ' error'; status = ' (多余)';
                    } else if (userVal !== correctVal) {
                        cls += ' mismatch'; status = ` (应为: ${correctVal})`;
                    } else {
                        cls += ' match'; status = ' (匹配)';
                    }
                    html += `<div class="${cls}"><strong>${key}:</strong> ${userVal || 'N/A'} <small>${status}</small></div>`;
                }
                resultsDiv.innerHTML = html;
            } catch (e) {
                alert('URL格式错误: ' + e.message);
            }
        }

        function clearResults() {
            document.getElementById('parsed-results').innerHTML = '';
            document.getElementById('comparison-results').innerHTML = '';
            document.getElementById('url-input').value = '';
            document.getElementById('correct-url-input').value = '';
        }

        // JSON Functions
        function extractJsonFields() {
            const jsonText = document.getElementById('json-input').value;
            const pathsText = document.getElementById('field-paths').value;
            if (!jsonText || !pathsText) {
                alert('请输入JSON和字段路径！');
                return;
            }
            try {
                const jsonData = JSON.parse(jsonText);
                const paths = pathsText.split('\n').map(p => p.trim()).filter(Boolean);
                const resultsDiv = document.getElementById('json-results');
                let html = '<h4>提取结果:</h4>';
                paths.forEach(path => {
                    try {
                        const value = getNestedValue(jsonData, path);
                        const valueStr = value !== undefined ? JSON.stringify(value) : 'undefined';
                        html += `<div class="result-item" data-field="${path}">
                                    <strong>${path}:</strong> ${valueStr}
                                    <input type="text" class="verification-input" placeholder="输入期望值..." data-field="${path}" data-actual="${valueStr}">
                                 </div>`;
                    } catch (e) {
                        html += `<div class="result-item error"><strong>${path}:</strong> 错误 - ${e.message}</div>`;
                    }
                });
                resultsDiv.innerHTML = html;
                attachVerificationListeners();
            } catch (e) {
                alert('JSON格式错误: ' + e.message);
            }
        }

        function getNestedValue(obj, path) {
            const keys = path.replace(/\[(\w+)\]/g, '.$1').split('.');
            let result = obj;
            for (const key of keys) {
                if (result === undefined || result === null) break;
                result = result[key];
            }
            return result;
        }

        function attachVerificationListeners() {
            document.querySelectorAll('#json-results .verification-input').forEach(input => {
                input.removeEventListener('input', handleVerification); // 防止重复绑定
                input.addEventListener('input', handleVerification);
            });
        }

        function handleVerification(e) {
            const input = e.target;
            const field = input.dataset.field;
            const actual = input.dataset.actual;
            const expected = input.value;
            
            const item = input.closest('.result-item');
            item.classList.remove('match', 'mismatch');
            
            if (expected === '') return; // 如果清空了输入框，则移除所有状态
            
            if (actual == expected) {
                item.classList.add('match');
            } else {
                item.classList.add('mismatch');
            }
        }

        function clearJsonResults() {
            document.getElementById('json-results').innerHTML = '';
            document.getElementById('json-input').value = '';
            document.getElementById('field-paths').value = '';
        }

        // Time Functions
        function convertTimestamp() {
            const ts = parseFloat(document.getElementById('timestamp-input').value);
            if (isNaN(ts)) {
                document.getElementById('timestamp-result').innerHTML = '<div class="result-item error">请输入有效的时间戳！</div>';
                return;
            }
            const d = ts > 1e12 ? new Date(ts) : new Date(ts * 1000);
            document.getElementById('timestamp-result').innerHTML = `<div class="result-item"><strong>转换结果:</strong> ${d.toLocaleString('zh-CN')}</div>`;
        }

        function convertMinutes() {
            const mins = parseInt(document.getElementById('minutes-input').value);
            if (isNaN(mins) || mins < 0) {
                document.getElementById('time-format-result').innerHTML = '<div class="result-item error">请输入有效的正整数分钟！</div>';
                return;
            }
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            const s = 0;
            document.getElementById('time-format-result').innerHTML = `<div class="result-item"><strong>转换结果:</strong> ${mins} 分钟 = ${h} 小时 ${m} 分 ${s} 秒</div>`;
        }
    </script>
</body>
</html>

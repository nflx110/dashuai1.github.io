<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL 解析 & 分析工具</title>
    <style id="theme-style">
        /* 默认浅色主题 */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #ddd;
            --input-bg: #f9f9f9;
            --button-bg: #007bff;
            --button-hover-bg: #0056b3;
            --highlight-color: #ffeb3b;
            --error-color: #f44336;
            --success-color: #4caf50;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto 20px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: minmax(180px, 240px) 1fr;
            gap: 20px;
        }

        .module-nav {
            background: linear-gradient(135deg, #fff1f5 0%, #ffecf6 100%);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 90px;
            height: fit-content;
        }

        .module-nav h2 {
            margin-top: 0;
            font-size: 1rem;
            color: #a82d6f;
        }

        .module-nav ul {
            padding: 0;
            margin: 12px 0 0;
            list-style: none;
        }

        .module-nav li {
            margin: 8px 0;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.25s;
            color: #7a215f;
            font-weight: 600;
        }

        .module-nav li:hover, .module-nav li.active {
            background-color: rgba(255, 152, 181, 0.2);
        }

        .modules {
            display: grid;
            gap: 18px;
        }

        .module-card {
            background: linear-gradient(120deg, rgba(255,255,255,.95), rgba(255,255,255,.8));
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.07);
            transition: transform 0.2s;
        }

        .module-card:hover {
            transform: translateY(-2px);
        }

        .module-card h2 {
            margin: 0 0 12px;  
            color: #c2185b;
        }

        .theme-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        button {
            background-color: var(--button-bg);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 8px;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--button-hover-bg);
        }

        .result-container {
            margin-top: 16px;
            padding: 14px;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            background-color: var(--input-bg);
        }

        .param-item {
            margin: 6px 0;
            padding: 8px;
            border-left: 4px solid var(--success-color);
            word-break: break-all;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.6);
        }
        
        .param-item.error {
            border-left-color: var(--error-color);
            background-color: rgba(244, 67, 54, 0.1);
        }

        .param-item.match {
            border-left-color: var(--success-color);
            background-color: rgba(76, 175, 80, 0.1);
        }

        .param-item.mismatch {
            border-left-color: var(--error-color);
            background-color: rgba(244, 67, 54, 0.1);
        }

        .timestamp-converter, .time-format-converter {
            margin-top: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>� 可爱模块化 URL 工具箱</h1>

        <!-- 主题选择器 -->
        <div class="theme-selector">
            <label for="theme-select">🎨 切换主题: </label>
            <select id="theme-select">
                <option value="light">默认</option>
                <option value="dark">暗黑</option>
                <option value="pink">粉红</option>
                <option value="green">护眼绿</option>
            </select>
        </div>

        <div class="dashboard">
            <aside class="module-nav">
                <h2>✨ 功能列表</h2>
                <ul>
                    <li id="nav-url" class="active" onclick="showModule('url')">🔍 URL 解析</li>
                    <li id="nav-compare" onclick="showModule('compare')">📋 URL 对比验证</li>
                    <li id="nav-timestamp" onclick="showModule('timestamp')">⏰ 时间戳转换</li>
                    <li id="nav-duration" onclick="showModule('duration')">⏱️ 分钟转时分秒</li>
                </ul>
            </aside>

            <main class="modules">
                <section id="module-url" class="module-card">
                    <h2>🔍 URL 解析</h2>
                    <div class="form-group">
                        <label for="url-input">请输入 URL:</label>
                        <textarea id="url-input" placeholder="例如: https://example.com/page?param1=value1&param2=value2"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="param-select">选择要提取的参数 (或添加自定义):</label>
                        <select id="param-select">
                            <option value="">-- 常用参数 --</option>
                            <option value="utm_source">utm_source</option>
                            <option value="utm_medium">utm_medium</option>
                            <option value="utm_campaign">utm_campaign</option>
                            <option value="id">id</option>
                            <option value="ref">ref</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="text" id="custom-param-input" placeholder="输入自定义参数名...">
                        <button onclick="addCustomParam()">➕ 添加</button>
                    </div>
                    <button onclick="parseUrl()">解析 URL</button>
                    <button onclick="clearResults()">清空结果</button>
                    <div id="parsed-results" class="result-container"></div>
                </section>

                <section id="module-compare" class="module-card" style="display:none;">
                    <h2>📋 URL 对比验证</h2>
                    <div class="form-group">
                        <label for="correct-url-input">请输入正确的参考 URL:</label>
                        <textarea id="correct-url-input" placeholder="粘贴原始或正确的URL进行比对..."></textarea>
                    </div>
                    <button onclick="compareUrls()">开始比对</button>
                    <div id="comparison-results" class="result-container"></div>
                </section>

                <section id="module-timestamp" class="module-card" style="display:none;">
                    <h2>⏰ 时间戳转换</h2>
                    <div class="form-group">
                        <label for="timestamp-input">输入时间戳 (秒或毫秒):</label>
                        <input type="number" id="timestamp-input" placeholder="例如: 1700000000 或 1700000000000">
                    </div>
                    <button onclick="convertTimestamp()">转换为日期</button>
                    <div id="timestamp-result" class="result-container"></div>
                </section>

                <section id="module-duration" class="module-card" style="display:none;">
                    <h2>⏱️ 分钟转时分秒</h2>
                    <div class="form-group">
                        <label for="minutes-input">输入分钟数:</label>
                        <input type="number" id="minutes-input" placeholder="例如: 125">
                    </div>
                    <button onclick="convertMinutes()">转换</button>
                    <div id="time-format-result" class="result-container"></div>
                </section>
            </main>
        </div>
    </div>

    <script>
        // --- 主题切换 ---
        const themeSelect = document.getElementById('theme-select');
        const styleElement = document.getElementById('theme-style');

        const themes = {
            light: `
                :root { --bg-color: #ffffff; --text-color: #333333; --border-color: #ddd; --input-bg: #f9f9f9; --button-bg: #007bff; --button-hover-bg: #0056b3; --card-bg: #ffffff; }
            `,
            dark: `
                :root { --bg-color: #1e1e1e; --text-color: #e0e0e0; --border-color: #444; --input-bg: #2d2d2d; --button-bg: #0d6efd; --button-hover-bg: #0b5ed7; --card-bg: #2d2d2d; }
            `,
            pink: `
                :root { --bg-color: #fff5f7; --text-color: #880e4f; --border-color: #f8bbd0; --input-bg: #fce4ec; --button-bg: #e91e63; --button-hover-bg: #c2185b; --card-bg: #fce4ec; }
            `,
            green: `
                :root { --bg-color: #f0f8f0; --text-color: #2e7d32; --border-color: #a5d6a7; --input-bg: #e8f5e9; --button-bg: #4caf50; --button-hover-bg: #388e3c; --card-bg: #e8f5e9; }
            `
        };

        function applyTheme(themeName) {
            styleElement.textContent = themes[themeName] || themes.light;
        }

        themeSelect.addEventListener('change', (e) => {
            applyTheme(e.target.value);
            localStorage.setItem('selectedTheme', e.target.value); // 保存用户选择
        });

        // 页面加载时恢复上次选择的主题
        window.onload = function() {
            const savedTheme = localStorage.getItem('selectedTheme') || 'light';
            applyTheme(savedTheme);
            themeSelect.value = savedTheme;
            showModule('url');
        };

        // --- URL 解析 ---
        let customParams = JSON.parse(localStorage.getItem('customParams')) || [];

        function populateParamSelect() {
            const select = document.getElementById('param-select');
            select.innerHTML = '<option value="">-- 常用参数 --</option>' +
                               '<option value="utm_source">utm_source</option>' +
                               '<option value="utm_medium">utm_medium</option>' +
                               '<option value="utm_campaign">utm_campaign</option>' +
                               '<option value="id">id</option>' +
                               '<option value="ref">ref</option>';
            
            customParams.forEach(param => {
                const option = document.createElement('option');
                option.value = param;
                option.textContent = param;
                select.appendChild(option);
            });
        }

        populateParamSelect();

        function showModule(moduleName) {
            const modules = ['url', 'compare', 'timestamp', 'duration'];
            modules.forEach((key) => {
                const section = document.getElementById(`module-${key}`);
                const navItem = document.getElementById(`nav-${key}`);
                if (section) section.style.display = (key === moduleName ? 'block' : 'none');
                if (navItem) {
                    if (key === moduleName) {
                        navItem.classList.add('active');
                    } else {
                        navItem.classList.remove('active');
                    }
                }
            });
        }

        function addCustomParam() {
            const input = document.getElementById('custom-param-input');
            const paramName = input.value.trim();
            if (paramName && !customParams.includes(paramName)) {
                customParams.push(paramName);
                localStorage.setItem('customParams', JSON.stringify(customParams));
                populateParamSelect();
                input.value = '';
            }
        }

        function parseUrl() {
            const urlStr = document.getElementById('url-input').value;
            if (!urlStr) return;

            try {
                const url = new URL(urlStr);
                const searchParams = new URLSearchParams(url.search);
                const resultsDiv = document.getElementById('parsed-results');
                
                let html = `<h3>解析结果:</h3>`;
                for (const [key, value] of searchParams) {
                    html += `<div class="param-item"><strong>${key}:</strong> ${value}</div>`;
                }
                resultsDiv.innerHTML = html;
            } catch (e) {
                alert('无效的 URL 格式!');
            }
        }

        function clearResults() {
            document.getElementById('parsed-results').innerHTML = '';
            document.getElementById('url-input').value = '';
        }

        // --- URL 对比 ---
        function compareUrls() {
            const userUrlStr = document.getElementById('url-input').value;
            const correctUrlStr = document.getElementById('correct-url-input').value;
            if (!userUrlStr || !correctUrlStr) {
                alert('请同时输入待比较的URL和正确的参考URL!');
                return;
            }

            try {
                const userUrl = new URL(userUrlStr);
                const correctUrl = new URL(correctUrlStr);

                const userParams = new Map(new URLSearchParams(userUrl.search));
                const correctParams = new Map(new URLSearchParams(correctUrl.search));

                const allKeys = new Set([...userParams.keys(), ...correctParams.keys()]);
                const resultsDiv = document.getElementById('comparison-results');

                let html = `<h3>比对结果:</h3>`;
                for (const key of allKeys) {
                    const userValue = userParams.get(key);
                    const correctValue = correctParams.get(key);
                    
                    let className = '';
                    let status = '';
                    if (userValue === undefined) {
                        className = 'error';
                        status = ' <span style="color: red;">(缺失)</span>';
                    } else if (correctValue === undefined) {
                        className = 'error';
                        status = ' <span style="color: red;">(多余)</span>';
                    } else if (userValue !== correctValue) {
                        className = 'mismatch';
                        status = ` <span style="color: orange;">(不匹配: 应为 "${correctValue}")</span>`;
                    } else {
                        className = 'match';
                        status = ` <span style="color: green;">(匹配)</span>`;
                    }
                    
                    html += `<div class="param-item ${className}"><strong>${key}:</strong> ${userValue || 'N/A'}${status}</div>`;
                }
                resultsDiv.innerHTML = html;
            } catch (e) {
                alert('URL 格式错误，请检查输入!');
            }
        }

        // --- 时间戳转换 ---
        function convertTimestamp() {
            const tsInput = document.getElementById('timestamp-input').value;
            if (!tsInput) return;

            let timestamp = parseFloat(tsInput);
            if (isNaN(timestamp)) {
                document.getElementById('timestamp-result').innerHTML = '请输入有效的时间戳数字！';
                return;
            }

            // 判断是秒还是毫秒
            let date;
            if (timestamp > 1e12) { // 毫秒时间戳
                date = new Date(timestamp);
            } else { // 秒时间戳
                date = new Date(timestamp * 1000);
            }

            const readableDate = date.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            document.getElementById('timestamp-result').innerHTML = `<strong>转换结果:</strong> ${readableDate}`;
        }

        // --- 分钟转时分秒 ---
        function convertMinutes() {
            const minutesInput = document.getElementById('minutes-input').value;
            if (!minutesInput) return;

            let totalMinutes = parseInt(minutesInput);
            if (isNaN(totalMinutes) || totalMinutes < 0) {
                document.getElementById('time-format-result').innerHTML = '请输入有效的正整数分钟！';
                return;
            }

            const hours = Math.floor(totalMinutes / 60);
            const remainingMinutes = totalMinutes % 60;
            const seconds = 0; // 分钟转过来，秒数为0

            const resultStr = `${totalMinutes} 分钟 = ${hours} 小时 ${remainingMinutes} 分 ${seconds} 秒`;
            document.getElementById('time-format-result').innerHTML = `<strong>转换结果:</strong> ${resultStr}`;
        }

    </script>
</body>
</html>

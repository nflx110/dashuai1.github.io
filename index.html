<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能数据解析工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* 默认主题 (蓝) */
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4cc9f0;
            --success-color: #4ade80;
            --warning-color: #facc15;
            --danger-color: #f87171;
            --background-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .control-group label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.25rem;
        }

        .theme-selector select,
        .wallpaper-input {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            backdrop-filter: blur(10px);
        }

        .theme-selector select option,
        .wallpaper-input option {
            background-color: var(--surface-color);
            color: var(--text-primary);
        }

        .wallpaper-input {
            width: 250px;
        }

        .tabs {
            display: flex;
            background-color: var(--surface-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin: 1.5rem 0;
            box-shadow: var(--shadow-md);
        }

        .tab-button {
            flex: 1;
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .tab-button i {
            font-size: 1.1rem;
        }

        .tab-button:hover:not(.active) {
            background-color: #f1f5f9;
            color: var(--text-primary);
        }

        .tab-button.active {
            background-color: var(--primary-color);
            color: white;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(500px, 100%), 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .card {
            background-color: var(--surface-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
            position: relative; /* For absolute positioning of clear button */
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: #f9fafb;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.2);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        .clear-btn-input {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: var(--radius-sm);
        }

        .clear-btn-input:hover {
            background-color: #e2e8f0;
            color: var(--text-primary);
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--secondary-color);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: #f1f5f9;
            color: var(--text-primary);
        }

        button.secondary:hover {
            background-color: #e2e8f0;
        }

        .custom-fields-container {
            margin-top: 1rem;
        }

        .custom-field-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem;
            background-color: #f1f5f9;
            border-radius: var(--radius-sm);
            margin-bottom: 0.25rem;
        }

        .custom-field-item span {
            font-family: monospace;
            word-break: break-all;
            cursor: pointer;
        }

        .custom-field-item button {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
        }

        .result-container {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f8fafc;
            border-radius: var(--radius-md);
            border: 1px dashed var(--border-color);
            min-height: 100px;
        }

        .result-item {
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
            font-family: monospace;
            word-break: break-all;
            background-color: white;
            border-left: 3px solid var(--primary-color);
        }

        .result-item.match {
            border-left-color: var(--success-color);
            background-color: #f0fdf4;
        }

        .result-item.mismatch {
            border-left-color: var(--warning-color);
            background-color: #fefce8;
        }

        .result-item.error {
            border-left-color: var(--danger-color);
            background-color: #fef2f2;
        }

        .verification-input {
            margin-top: 0.5rem;
            width: calc(100% - 2rem);
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }

        /* Multi-Select Dropdown Styles */
        .multi-select-wrapper {
            position: relative;
            width: 100%;
        }

        .multi-select-trigger {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: #f9fafb;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .multi-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
        }

        .multi-select-option {
            padding: 0.5rem 1rem;
            cursor: pointer;
        }

        .multi-select-option:hover {
            background-color: #f1f5f9;
        }

        .multi-select-option.selected {
            background-color: #dbeafe;
            color: var(--primary-color);
        }

        .selected-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-top: 0.25rem;
        }

        .selected-tag {
            background-color: var(--primary-color);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .selected-tag button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            margin: 0;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body ul {
            list-style-type: none;
            padding: 0;
        }

        .modal-body li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .controls {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                align-items: stretch;
            }

            .wallpaper-input {
                width: 100%;
            }
            
            .card-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1><i class="fas fa-wrench"></i> 智能数据解析工具</h1>
            <div class="controls">
                <div class="control-group">
                    <label for="theme-select">主题颜色</label>
                    <select id="theme-select">
                        <option value="blue">蓝色 (默认)</option>
                        <option value="green">绿色</option>
                        <option value="purple">紫色</option>
                        <option value="red">红色</option>
                        <option value="orange">橙色</option>
                        <option value="teal">青色</option>
                        <option value="indigo">靛蓝</option>
                        <option value="pink">粉色</option>
                        <option value="yellow">黄色</option>
                        <option value="gray">灰色</option>
                        <option value="dark">深色模式</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="wallpaper-input">自定义壁纸</label>
                    <select id="wallpaper-input" onchange="setCustomBackground(this.value)">
                        <option value="">默认背景</option>
                        <option value="https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1920&auto=format&fit=crop">森林晨雾</option>
                        <option value="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920&auto=format&fit=crop">山川湖泊</option>
                        <option value="https://images.unsplash.com/photo-1469474968028-56623f02e42e?q=80&w=1920&auto=format&fit=crop">自然风光</option>
                        <option value="custom">自定义URL...</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <div class="app-container">
        <nav class="tabs">
            <button class="tab-button active" data-tab="url-tab">
                <i class="fas fa-link"></i> URL 解析
            </button>
            <button class="tab-button" data-tab="json-tab">
                <i class="fas fa-file-code"></i> JSON 解析
            </button>
            <button class="tab-button" data-tab="time-tab">
                <i class="fas fa-clock"></i> 时间转换
            </button>
        </nav>

        <main>
            <!-- URL Tab -->
            <section id="url-tab" class="tab-content active">
                <div class="card-grid">
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-cogs"></i> 解析与提取</h3>
                        <div class="form-group">
                            <label for="url-input"><i class="fas fa-globe-asia"></i> 输入URL</label>
                            <div class="form-row">
                                <textarea id="url-input" placeholder="https://example.com/path?param1=value1&param2=value2"></textarea>
                                <button class="clear-btn-input" title="清空" onclick="clearInputField('url-input')"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="param-select"><i class="fas fa-list"></i> 选择参数</label>
                            <div class="multi-select-wrapper">
                                <div class="multi-select-trigger" onclick="toggleMultiSelectDropdown()">
                                    <span id="multi-select-trigger-text">请选择参数...</span>
                                    <i class="fas fa-chevron-down"></i>
                                </div>
                                <div class="multi-select-dropdown" id="multi-select-dropdown">
                                    <div class="multi-select-option" data-value="">全部参数</div>
                                    <div class="multi-select-option" data-value="utm_source">utm_source</div>
                                    <div class="multi-select-option" data-value="utm_medium">utm_medium</div>
                                    <div class="multi-select-option" data-value="utm_campaign">utm_campaign</div>
                                    <div class="multi-select-option" data-value="id">id</div>
                                    <div class="multi-select-option" data-value="ref">ref</div>
                                    <!-- Custom params will be injected here -->
                                    <div class="multi-select-option" data-value="custom_params_manage">管理自定义参数...</div>
                                </div>
                            </div>
                            <div class="selected-tags" id="selected-tags-container"></div>
                        </div>
                        <div class="button-group">
                            <button onclick="parseUrl()"><i class="fas fa-play"></i> 解析</button>
                            <button class="secondary" onclick="clearAllUrl()"><i class="fas fa-broom"></i> 清空全部</button>
                        </div>
                        <div id="parsed-results" class="result-container"></div>
                    </div>
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-exchange-alt"></i> 对比验证</h3>
                        <div class="form-group">
                            <label for="correct-url-input"><i class="fas fa-check-circle"></i> 参考URL</label>
                            <div class="form-row">
                                <textarea id="correct-url-input" placeholder="粘贴正确的URL进行比对..."></textarea>
                                <button class="clear-btn-input" title="清空" onclick="clearInputField('correct-url-input')"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        <button onclick="compareUrls()"><i class="fas fa-search"></i> 开始比对</button>
                        <div id="comparison-results" class="result-container"></div>
                    </div>
                </div>
            </section>

            <!-- JSON Tab -->
            <section id="json-tab" class="tab-content">
                <div class="card-grid">
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-cogs"></i> 解析与提取</h3>
                        <div class="form-group">
                            <label for="json-input"><i class="fas fa-code"></i> 输入JSON</label>
                            <div class="form-row">
                                <textarea id="json-input" placeholder='{ "user": { "name": "张三" } }'></textarea>
                                <button class="clear-btn-input" title="清空" onclick="clearInputField('json-input')"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="field-paths"><i class="fas fa-key"></i> 字段路径或字段名 (每行一个)</label>
                            <div class="form-row">
                                <textarea id="field-paths" placeholder="user.name&#10;name&#10;user.id">user.name
name
user.id
settings.theme</textarea>
                                <button class="clear-btn-input" title="清空" onclick="clearInputField('field-paths')"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-plus-circle"></i> 添加自定义字段路径</label>
                            <div class="form-row">
                                <input type="text" id="new-field-path" placeholder="例如: profile.avatar">
                                <button onclick="addCustomFieldPath()" style="padding: 0.75rem;"><i class="fas fa-plus"></i> 添加</button>
                            </div>
                        </div>

                        <div class="custom-fields-container">
                            <h4>我的常用路径:</h4>
                            <div id="saved-custom-fields-json"></div>
                        </div>

                        <div class="button-group">
                            <button onclick="extractJsonFields()"><i class="fas fa-play"></i> 提取</button>
                            <button class="secondary" onclick="clearAllJson()"><i class="fas fa-broom"></i> 清空全部</button>
                        </div>
                        <div id="json-results" class="result-container"></div>
                    </div>
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-tasks"></i> 验证中心</h3>
                        <p>在上方提取结果中，每个字段旁会出现输入框，输入期望值即可实时比对。</p>
                        <div id="verification-results" class="result-container">
                            <p>请先在左侧执行“提取”操作。</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Time Tab -->
            <section id="time-tab" class="tab-content">
                <div class="card-grid">
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-calendar-day"></i> 时间单位转换</h3>
                        <div class="form-group">
                            <label for="conversion-type"><i class="fas fa-sliders-h"></i> 选择转换类型</label>
                            <select id="conversion-type" class="conversion-select">
                                <option value="minutes-to-hours-minutes">分钟转时分秒</option>
                                <option value="minutes-to-minutes-seconds">分钟转分秒</option>
                                <option value="hours-to-minutes-seconds">小时转分秒</option>
                                <option value="seconds-to-minutes-seconds">秒数转分秒</option>
                                <option value="milliseconds-to-minutes-seconds">毫秒转分秒</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="output-format"><i class="fas fa-ruler-combined"></i> 输出格式</label>
                            <select id="output-format" class="conversion-select">
                                <option value="hms">时:分:秒</option>
                                <option value="ms">分:秒</option>
                                <option value="total_seconds">总秒数</option>
                                <option value="total_milliseconds">总毫秒数</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="input-value"><i class="fas fa-stopwatch"></i> 输入数值</label>
                            <div class="form-row">
                                <input type="number" id="input-value" placeholder="请输入数字" min="0" step="1">
                                <button class="clear-btn-input" title="清空" onclick="clearInputField('input-value')"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        <button onclick="convertTime()"><i class="fas fa-sync-alt"></i> 转换</button>
                        <div id="time-conversion-result" class="result-container"></div>
                    </div>
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-hourglass-end"></i> 时间戳转换</h3>
                        <div class="form-group">
                            <label for="timestamp-input"><i class="fas fa-hourglass-half"></i> 输入时间戳 (秒或毫秒)</label>
                            <div class="form-row">
                                <input type="number" id="timestamp-input" placeholder="例如: 1700000000 或 1700000000000">
                                <button class="clear-btn-input" title="清空" onclick="clearInputField('timestamp-input')"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                        <button onclick="convertTimestamp()"><i class="fas fa-sync-alt"></i> 转换</button>
                        <div id="timestamp-result" class="result-container"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Custom URL Params -->
    <div id="custom-params-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>管理自定义URL参数</h3>
                <span class="close-modal" onclick="closeModal('custom-params-modal')">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <input type="text" id="new-param-name" placeholder="参数名，如: custom_id">
                    <button onclick="addCustomParam()"><i class="fas fa-plus"></i> 添加</button>
                </div>
                <ul id="saved-custom-params-list"></ul>
            </div>
            <div class="modal-actions">
                <button class="secondary" onclick="closeModal('custom-params-modal')">取消</button>
                <button onclick="saveAndCloseParamsModal()">保存并关闭</button>
            </div>
        </div>
    </div>

    <footer>
        <p>智能数据解析工具 &copy; 2026</p>
    </footer>

    <script>
        // --- State Management ---
        let customJsonFields = JSON.parse(localStorage.getItem('customJsonFields')) || [];
        let customUrlParams = JSON.parse(localStorage.getItem('customUrlParams')) || [];
        let selectedUrlParams = []; // For multi-select state

        // --- Tab Switching ---
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', () => {
                const targetTab = button.getAttribute('data-tab');

                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.querySelectorAll('.tab-button').forEach(btn => {
                    btn.classList.remove('active');
                });

                document.getElementById(targetTab).classList.add('active');
                button.classList.add('active');
            });
        });

        // --- Theme & Background ---
        const themes = {
            blue: { '--primary-color': '#4361ee', '--secondary-color': '#3f37c9', '--background-color': '#f8fafc', '--surface-color': '#ffffff', '--text-primary': '#1e293b', '--text-secondary': '#64748b', '--border-color': '#e2e8f0' },
            green: { '--primary-color': '#22c55e', '--secondary-color': '#16a34a', '--background-color': '#f0fdf4', '--surface-color': '#ffffff', '--text-primary': '#1e293b', '--text-secondary': '#64748b', '--border-color': '#bbf7d0' },
            purple: { '--primary-color': '#a855f7', '--secondary-color': '#9333ea', '--background-color': '#faf5ff', '--surface-color': '#ffffff', '--text-primary': '#1e293b', '--text-secondary': '#64748b', '--border-color': '#e9d5ff' },
            red: { '--primary-color': '#ef4444', '--secondary-color': '#dc2626', '--background-color': '#fef2f2', '--surface-color': '#ffffff', '--text-primary': '#1e293b', '--text-secondary': '#64748b', '--border-color': '#fecaca' },
            orange: { '--primary-color': '#f97316', '--secondary-color': '#ea580c', '--background-color': '#fff7ed', '--surface-color': '#ffffff', '--text-primary': '#1e293b', '--text-secondary': '#64748b', '--border-color': '#fed7aa' },
            teal: { '--primary-color': '#14b8a6', '--secondary-color': '#0d9488', '--background-color': '#f0fdfa', '--surface-color': '#ffffff', '--text-primary': '#1e293b', '--text-secondary': '#64748b', '--border-color': '#a7f3d0' },
            indigo: { '--primary-color': '#6366f1', '--secondary-color': '#4f46e5', '--background-color': '#eef2ff', '--surface-color': '#ffffff', '--text-primary': '#1e293b', '--text-secondary': '#64748b', '--border-color': '#c7d2fe' },
            pink: { '--primary-color': '#ec4899', '--secondary-color': '#db2777', '--background-color': '#fdf2f8', '--surface-color': '#ffffff', '--text-primary': '#1e293b', '--text-secondary': '#64748b', '--border-color': '#fbcfe8' },
            yellow: { '--primary-color': '#eab308', '--secondary-color': '#ca8a04', '--background-color': '#fefce8', '--surface-color': '#ffffff', '--text-primary': '#1e293b', '--text-secondary': '#64748b', '--border-color': '#fde047' },
            gray: { '--primary-color': '#6b7280', '--secondary-color': '#4b5563', '--background-color': '#f9fafb', '--surface-color': '#ffffff', '--text-primary': '#1e293b', '--text-secondary': '#64748b', '--border-color': '#e5e7eb' },
            dark: { '--primary-color': '#809fff', '--secondary-color': '#6d61d6', '--background-color': '#0f172a', '--surface-color': '#1e293b', '--text-primary': '#f1f5f9', '--text-secondary': '#94a3b8', '--border-color': '#334155' }
        };

        const root = document.documentElement;
        const themeSelect = document.getElementById('theme-select');
        const wallpaperSelect = document.getElementById('wallpaper-input');

        function applyTheme(themeName) {
            const themeVars = themes[themeName] || themes.blue;
            Object.entries(themeVars).forEach(([prop, val]) => {
                root.style.setProperty(prop, val);
            });
            localStorage.setItem('selectedTheme', themeName);
        }

        function setCustomBackground(imageUrl) {
            if (imageUrl === 'custom') {
                imageUrl = prompt("请输入图片URL:");
                if (imageUrl) {
                    document.body.style.backgroundImage = `url('${imageUrl}')`;
                    localStorage.setItem('customWallpaper', imageUrl);
                    wallpaperSelect.value = imageUrl;
                } else {
                    wallpaperSelect.value = '';
                }
            } else if(imageUrl){
                 document.body.style.backgroundImage = `url('${imageUrl}')`;
                 localStorage.setItem('customWallpaper', imageUrl);
            } else {
                 document.body.style.backgroundImage = '';
                 localStorage.removeItem('customWallpaper');
            }
        }

        themeSelect.addEventListener('change', (e) => applyTheme(e.target.value));
        window.onload = function() {
            const savedTheme = localStorage.getItem('selectedTheme') || 'blue';
            const savedWallpaper = localStorage.getItem('customWallpaper') || '';
            applyTheme(savedTheme);
            themeSelect.value = savedTheme;
            if(savedWallpaper) {
                document.body.style.backgroundImage = `url('${savedWallpaper}')`;
                wallpaperSelect.value = savedWallpaper;
            }
            // Initialize custom params in dropdown
            updateUrlParamDropdownOptions();
            // Initialize saved fields
            renderSavedJsonFields();
        };


        // --- Utility Functions ---
        function clearInputField(fieldId) {
            document.getElementById(fieldId).value = '';
        }

        function clearResults(containerId) {
            document.getElementById(containerId).innerHTML = '';
        }

        // --- Multi-Select Dropdown for URL Params ---
        function toggleMultiSelectDropdown() {
            const dropdown = document.getElementById('multi-select-dropdown');
            const isHidden = dropdown.style.display === 'none' || dropdown.style.display === '';
            dropdown.style.display = isHidden ? 'block' : 'none';
        }

        function updateSelectedTagsDisplay() {
            const container = document.getElementById('selected-tags-container');
            container.innerHTML = '';
            selectedUrlParams.forEach(param => {
                if(param === '') return; // Skip 'all'
                const tag = document.createElement('div');
                tag.className = 'selected-tag';
                tag.innerHTML = `${param} <button onclick="removeSelectedParam('${param}')"><i class="fas fa-times"></i></button>`;
                container.appendChild(tag);
            });
            document.getElementById('multi-select-trigger-text').textContent = 
                selectedUrlParams.length === 0 ? '请选择参数...' : 
                selectedUrlParams.length === 1 ? selectedUrlParams[0] : 
                `${selectedUrlParams.length} 项已选`;
        }

        function removeSelectedParam(paramToRemove) {
            selectedUrlParams = selectedUrlParams.filter(p => p !== paramToRemove);
            updateSelectedTagsDisplay();
            const allOptions = document.querySelectorAll('#multi-select-dropdown .multi-select-option');
            allOptions.forEach(opt => {
                if (opt.dataset.value === paramToRemove) {
                    opt.classList.remove('selected');
                }
            });
        }

        document.querySelectorAll('#multi-select-dropdown .multi-select-option').forEach(option => {
            option.addEventListener('click', (e) => {
                e.stopPropagation();
                const value = option.dataset.value;
                
                if (value === 'custom_params_manage') {
                    openCustomParamsModal();
                    return;
                }

                if (value === '') { // 'All' option
                    if (selectedUrlParams.includes('')) {
                        selectedUrlParams = [];
                    } else {
                        selectedUrlParams = [''];
                    }
                } else {
                    if (selectedUrlParams.includes(value)) {
                        selectedUrlParams = selectedUrlParams.filter(v => v !== value);
                    } else {
                        selectedUrlParams = selectedUrlParams.filter(v => v !== ''); // Remove 'all' if specific one is selected
                        selectedUrlParams.push(value);
                    }
                }
                
                // Update UI
                document.querySelectorAll('#multi-select-dropdown .multi-select-option').forEach(opt => {
                    if (opt.dataset.value === value && value !== 'custom_params_manage') {
                        opt.classList.toggle('selected', selectedUrlParams.includes(value));
                    } else if (opt.dataset.value !== 'custom_params_manage'){
                        opt.classList.toggle('selected', selectedUrlParams.includes(opt.dataset.value));
                    }
                });

                updateSelectedTagsDisplay();
            });
        });

        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('multi-select-dropdown');
            const trigger = document.querySelector('.multi-select-trigger');
            if (!trigger.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });

        function updateUrlParamDropdownOptions() {
            const dropdown = document.getElementById('multi-select-dropdown');
            const existingCustomItems = dropdown.querySelectorAll('.custom-param-option');
            existingCustomItems.forEach(el => el.remove());

            customUrlParams.forEach(param => {
                const opt = document.createElement('div');
                opt.className = 'multi-select-option custom-param-option';
                opt.dataset.value = param;
                opt.textContent = param;
                dropdown.insertBefore(opt, document.querySelector('.multi-select-option[data-value="custom_params_manage"]'));
            });
        }


        // --- URL Functions ---
        function parseUrl() {
            const urlStr = document.getElementById('url-input').value;
            if (!urlStr) return;
            try {
                const url = new URL(urlStr);
                const searchParams = new URLSearchParams(url.search);
                const resultsDiv = document.getElementById('parsed-results');

                let html = '<h4>解析结果:</h4>';

                if (selectedUrlParams.includes('')) {
                    // If 'all' is selected, show all
                    for (const [key, value] of searchParams) {
                        html += `<div class="result-item"><strong>${key}:</strong> ${value}</div>`;
                    }
                } else if (selectedUrlParams.length > 0) {
                    // Show only selected params
                    selectedUrlParams.forEach(param => {
                        const value = searchParams.get(param);
                        html += `<div class="result-item"><strong>${param}:</strong> ${value || 'N/A'}</div>`;
                    });
                } else {
                    // If nothing is selected, show all as fallback
                     for (const [key, value] of searchParams) {
                        html += `<div class="result-item"><strong>${key}:</strong> ${value}</div>`;
                    }
                }
                resultsDiv.innerHTML = html;
            } catch (e) {
                alert('URL格式错误: ' + e.message);
            }
        }

        function compareUrls() {
            const userUrlStr = document.getElementById('url-input').value;
            const correctUrlStr = document.getElementById('correct-url-input').value;
            if (!userUrlStr || !correctUrlStr) {
                alert('请输入待比较和参考的URL！');
                return;
            }
            try {
                const userUrl = new URL(userUrlStr);
                const correctUrl = new URL(correctUrlStr);
                const userParams = new Map(new URLSearchParams(userUrl.search));
                const correctParams = new Map(new URLSearchParams(correctUrl.search));
                const allKeys = new Set([...userParams.keys(), ...correctParams.keys()]);
                const resultsDiv = document.getElementById('comparison-results');

                let html = '<h4>比对结果:</h4>';
                for (const key of allKeys) {
                    const userVal = userParams.get(key);
                    const correctVal = correctParams.get(key);
                    let cls = 'result-item';
                    let status = '';
                    if (userVal === undefined) {
                        cls += ' error'; status = ' (缺失)';
                    } else if (correctVal === undefined) {
                        cls += ' error'; status = ' (多余)';
                    } else if (userVal !== correctVal) {
                        cls += ' mismatch'; status = ` (应为: ${correctVal})`;
                    } else {
                        cls += ' match'; status = ' (匹配)';
                    }
                    html += `<div class="${cls}"><strong>${key}:</strong> ${userVal || 'N/A'} <small>${status}</small></div>`;
                }
                resultsDiv.innerHTML = html;
            } catch (e) {
                alert('URL格式错误: ' + e.message);
            }
        }

        function clearAllUrl() {
            clearInputField('url-input');
            clearInputField('correct-url-input');
            selectedUrlParams = [];
            updateSelectedTagsDisplay();
            document.querySelectorAll('#multi-select-dropdown .multi-select-option').forEach(opt => opt.classList.remove('selected'));
            clearResults('parsed-results');
            clearResults('comparison-results');
        }


        // --- Custom URL Params Modal ---
        function openCustomParamsModal() {
            document.getElementById('custom-params-modal').style.display = 'flex';
            renderSavedParamsList();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function renderSavedParamsList() {
            const container = document.getElementById('saved-custom-params-list');
            container.innerHTML = '';
            customUrlParams.forEach(param => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${param}</span>
                    <button class="secondary" onclick="removeCustomParam('${param}')"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(li);
            });
        }

        function addCustomParam() {
            const input = document.getElementById('new-param-name');
            const name = input.value.trim();
            if (name && !customUrlParams.includes(name)) {
                customUrlParams.push(name);
                renderSavedParamsList();
                updateUrlParamDropdownOptions(); // Add to dropdown
                input.value = '';
            }
        }

        function removeCustomParam(name) {
            customUrlParams = customUrlParams.filter(p => p !== name);
            renderSavedParamsList();
            updateUrlParamDropdownOptions(); // Remove from dropdown
            // Also remove from selected if present
            removeSelectedParam(name);
        }

        function saveAndCloseParamsModal() {
            localStorage.setItem('customUrlParams', JSON.stringify(customUrlParams));
            closeModal('custom-params-modal');
        }


        // --- JSON Functions ---
        function jsonStringifySafe(obj) {
            return JSON.stringify(obj, (key, val) => typeof val === 'function' ? val.toString() : val);
        }

        function extractJsonFields() {
            const jsonText = document.getElementById('json-input').value;
            const pathsText = document.getElementById('field-paths').value;
            if (!jsonText || !pathsText) {
                alert('请输入JSON和字段路径！');
                return;
            }
            try {
                let jsonData;
                try {
                    jsonData = JSON.parse(jsonText);
                } catch {
                    // Attempt to fix common non-standard JSON issues
                    let fixedJsonText = jsonText
                        .replace(/(\w+):/g, '"$1":') // Wrap unquoted keys in quotes
                        .replace(/'/g, '"'); // Replace single quotes with double quotes
                    jsonData = JSON.parse(fixedJsonText);
                }

                const paths = pathsText.split('\n').map(p => p.trim()).filter(Boolean);
                const resultsDiv = document.getElementById('json-results');
                let html = '<h4>提取结果:</h4>';
                
                paths.forEach(path => {
                    // Determine if it's a full path (contains dots) or a simple field name
                    const isFullPath = path.includes('.');
                    
                    if (isFullPath) {
                        // Exact Path Match
                        try {
                            const value = getNestedValue(jsonData, path);
                            const valueStr = value !== undefined ? jsonStringifySafe(value) : 'undefined';
                            html += `<div class="result-item" data-field="${path}">
                                        <strong>${path}:</strong> ${valueStr}
                                        <input type="text" class="verification-input" placeholder="输入期望值..." data-field="${path}" data-actual="${valueStr}">
                                     </div>`;
                        } catch (e) {
                            html += `<div class="result-item error"><strong>${path}:</strong> 错误 - ${e.message}</div>`;
                        }
                    } else {
                        // Fuzzy Field Name Search
                        const matches = findValuesByFieldName(jsonData, path);
                        if (matches.length > 0) {
                            matches.forEach((match, idx) => {
                                const uniqueKey = `${path}_${idx}`;
                                const valueStr = jsonStringifySafe(match.value);
                                html += `<div class="result-item" data-field="${uniqueKey}">
                                            <strong>[模糊匹配] ${match.path}:</strong> ${valueStr}
                                            <input type="text" class="verification-input" placeholder="输入期望值..." data-field="${uniqueKey}" data-actual="${valueStr}">
                                         </div>`;
                            });
                        } else {
                            html += `<div class="result-item error"><strong>[未找到] ${path}:</strong> 在JSON中未找到该字段名</div>`;
                        }
                    }
                });
                resultsDiv.innerHTML = html;
                attachVerificationListeners();
            } catch (e) {
                alert('JSON格式错误或自动修复失败: ' + e.message);
            }
        }

        function getNestedValue(obj, path) {
            const keys = path.replace(/\[(\w+)\]/g, '.$1').split('.');
            let result = obj;
            for (const key of keys) {
                if (result === undefined || result === null) break;
                result = result[key];
            }
            return result;
        }

        function findValuesByFieldName(obj, fieldName, path = '', results = []) {
            if (obj !== null && typeof obj === 'object') {
                Object.keys(obj).forEach(key => {
                    const newPath = path ? `${path}.${key}` : key;
                    if (key === fieldName) {
                        results.push({ path: newPath, value: obj[key] });
                    }
                    findValuesByFieldName(obj[key], fieldName, newPath, results);
                });
            }
            return results;
        }


        function attachVerificationListeners() {
            document.querySelectorAll('#json-results .verification-input').forEach(input => {
                input.removeEventListener('input', handleVerification);
                input.addEventListener('input', handleVerification);
            });
        }

        function handleVerification(e) {
            const input = e.target;
            const field = input.dataset.field;
            const actual = input.dataset.actual;
            const expected = input.value;
            
            const item = input.closest('.result-item');
            item.classList.remove('match', 'mismatch');
            
            if (expected === '') return;
            
            if (actual == expected) {
                item.classList.add('match');
            } else {
                item.classList.add('mismatch');
            }
        }

        function addCustomFieldPath() {
            const input = document.getElementById('new-field-path');
            const path = input.value.trim();
            if (path && !customJsonFields.includes(path)) {
                customJsonFields.push(path);
                localStorage.setItem('customJsonFields', JSON.stringify(customJsonFields));
                renderSavedJsonFields();
                input.value = '';
            }
        }

        function renderSavedJsonFields() {
            const container = document.getElementById('saved-custom-fields-json');
            container.innerHTML = '';
            customJsonFields.forEach(field => {
                const div = document.createElement('div');
                div.className = 'custom-field-item';
                div.innerHTML = `
                    <span onclick="insertFieldPathIntoTextarea('${field}')">${field}</span>
                    <button class="secondary" onclick="removeCustomJsonField('${field}')"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(div);
            });
        }

        function insertFieldPathIntoTextarea(path) {
            const textarea = document.getElementById('field-paths');
            const current = textarea.value;
            if (!current.split('\n').includes(path)) {
                textarea.value = current ? current + '\n' + path : path;
            }
        }

        function removeCustomJsonField(path) {
            customJsonFields = customJsonFields.filter(f => f !== path);
            localStorage.setItem('customJsonFields', JSON.stringify(customJsonFields));
            renderSavedJsonFields(); // Refresh the list
        }

        function clearAllJson() {
            clearInputField('json-input');
            clearInputField('field-paths');
            clearResults('json-results');
            document.getElementById('verification-results').innerHTML = '<p>请先在左侧执行“提取”操作。</p>';
        }


        // --- Time Functions ---
        function convertTime() {
            const conversionType = document.getElementById('conversion-type').value;
            const outputFormat = document.getElementById('output-format').value;
            const inputValue = parseFloat(document.getElementById('input-value').value);

            if (isNaN(inputValue) || inputValue < 0) {
                document.getElementById('time-conversion-result').innerHTML = '<div class="result-item error">请输入有效的非负数字！</div>';
                return;
            }

            let totalSeconds = 0;
            let totalMilliseconds = 0;

            switch (conversionType) {
                case 'minutes-to-hours-minutes':
                    totalSeconds = inputValue * 60;
                    break;
                case 'minutes-to-minutes-seconds':
                    totalSeconds = inputValue * 60;
                    break;
                case 'hours-to-minutes-seconds':
                    totalSeconds = inputValue * 60 * 60;
                    break;
                case 'seconds-to-minutes-seconds':
                    totalSeconds = inputValue;
                    break;
                case 'milliseconds-to-minutes-seconds':
                    totalMilliseconds = inputValue;
                    totalSeconds = inputValue / 1000;
                    break;
                default:
                    document.getElementById('time-conversion-result').innerHTML = '<div class="result-item error">未知转换类型</div>';
                    return;
            }

            let resultText = '';
            const absTotalSeconds = Math.abs(totalSeconds);
            const absTotalMilliseconds = Math.abs(totalMilliseconds);
            
            const sign = totalSeconds < 0 ? '-' : '';

            switch (outputFormat) {
                case 'hms':
                    const hours = Math.floor(absTotalSeconds / 3600);
                    const minutes = Math.floor((absTotalSeconds % 3600) / 60);
                    const seconds = Math.floor(absTotalSeconds % 60);
                    resultText = `${sign}${hours}小时${minutes}分${seconds}秒`;
                    break;
                case 'ms':
                    const mins = Math.floor(absTotalSeconds / 60);
                    const secs = Math.floor(absTotalSeconds % 60);
                    resultText = `${sign}${mins}分${secs}秒`;
                    break;
                case 'total_seconds':
                    resultText = `${sign}${Math.round(absTotalSeconds)} 秒`;
                    break;
                case 'total_milliseconds':
                    resultText = `${sign}${Math.round(absTotalMilliseconds || absTotalSeconds * 1000)} 毫秒`;
                    break;
                default:
                    resultText = '未知输出格式';
            }

            document.getElementById('time-conversion-result').innerHTML = `<div class="result-item match"><strong>转换结果:</strong> ${resultText}</div>`;
        }

        function convertTimestamp() {
            const ts = parseFloat(document.getElementById('timestamp-input').value);
            if (isNaN(ts)) {
                document.getElementById('timestamp-result').innerHTML = '<div class="result-item error">请输入有效的时间戳！</div>';
                return;
            }
            const d = ts > 1e12 ? new Date(ts) : new Date(ts * 1000);
            document.getElementById('timestamp-result').innerHTML = `<div class="result-item"><strong>转换结果:</strong> ${d.toLocaleString('zh-CN')}</div>`;
        }

    </script>
</body>
</html>
